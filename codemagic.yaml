workflows:
  android-build:
    name: Sift Android APK Build
    max_build_duration: 30
    instance_type: linux
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set Up Java 17
        script: |
          jdk-switch --version 17
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - build/outputs/apk/debug/*.apk
      - "**/build/outputs/apk/debug/*.apk"

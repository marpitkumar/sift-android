workflows:
  android-build:
    name: Sift Android APK Build
    max_build_duration: 30
    instance_type: linux
    environment:
      java: 17
    scripts:
      - name: Set up local properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Debug APK
        run: ./gradlew assembleDebug
    artifacts:
      - build/outputs/apk/debug/*.apk
      - "**/build/outputs/apk/debug/*.apk"

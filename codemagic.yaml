workflows:
  android-build:
    name: Sift Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    scripts:
      - name: Build Debug APK
        script: |
          # Automatically find where gradlew is hiding and move there
          GRADLE_DIR=$(dirname $(find . -name gradlew | head -n 1))
          cd "$GRADLE_DIR"
          
          # Force execute permissions and compile
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - build/outputs/apk/debug/*.apk
      - "**/build/outputs/apk/debug/*.apk"
